---
task_flow:
  # Canonical execution order (edit here when adding a new phase)
  order:
    - assert
    - install
    - config
    - validate

  # Profiles/categories used by roles
  profiles:
    # Standard
    full: [assert, install, config, validate]
    config: [assert, config, validate]
    guard: [assert]
    # Dev profiles (skip validate while iterating)
    full_dev: [assert, install, config]
    config_dev: [assert, config]
