repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--unsafe"]
      - id: check-added-large-files

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.38.0
    hooks:
      - id: yamllint
        files: \.(yaml|yml)$
        args:
          - -d
          - |
            {
              extends: default,
              rules: {
                truthy: disable,
                line-length: {max: 160},
                comments: disable,
                braces: {max-spaces-inside: 1}
              }
            }

  - repo: local
    hooks:
      - id: ansible-lint
        name: ansible-lint (pipx)
        entry: ansible-lint -q
        language: system
        pass_filenames: false
        files: (?x)^(ansible\.cfg|.*\.ya?ml)$
        exclude: (?x)^(\n          \.git/|\n          \.cache/|\n          \.venv/|\n          vendor/|\n          collections/\n        )
