---
# roles/base_packages/tasks/install.yml
# Install phase tasks for the `base_packages` role.
# Ensures the requested common packages are present on the target hosts.

- name: "Install | Ensure requested packages are present"
  ansible.builtin.package:
    name: "{{ base_packages_install }}"
    state: present
  when: base_packages_install | length > 0
