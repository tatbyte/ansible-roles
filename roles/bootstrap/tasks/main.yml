---
# roles/bootstrap/tasks/main.yml
# Task entrypoint for the `bootstrap` role.
# Imports the assert, config, and validate phase files in order.

- name: Assert
  ansible.builtin.import_tasks: assert.yml
  tags: [bootstrap, assert, bootstrap_assert]

- name: Config
  ansible.builtin.import_tasks: config.yml
  tags: [bootstrap, config, bootstrap_config]

- name: Validate
  ansible.builtin.import_tasks: validate.yml
  tags: [bootstrap, validate, bootstrap_validate]
